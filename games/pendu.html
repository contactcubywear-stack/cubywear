<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Pendu</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/pendu.css">
</head>

<body>

  <h1>🪢 Pendu</h1>

  <div class="difficulty-select" id="difficultySelect">
    <p>Choisis la difficulté</p>
    <div class="difficulty-buttons">
      <button class="btn-small" data-difficulty="facile">Facile</button>
      <button class="btn-small" data-difficulty="moyen">Moyen</button>
      <button class="btn-small" data-difficulty="difficile">Difficile</button>
      <button class="btn-small" data-difficulty="impossible">Impossible</button>
    </div>
    <div class="actions">
      <a href="../index.html" class="btn-small">Menu principal</a>
    </div>
  </div>

  <div id="gameArea" hidden>
    <p id="theme">Thème : ...</p>

    <svg class="hangman-figure" id="figure" viewBox="0 0 160 180">
      <line x1="10" y1="170" x2="110" y2="170" stroke-width="4" />
      <line x1="30" y1="170" x2="30" y2="10" stroke-width="4" />
      <line x1="30" y1="10" x2="100" y2="10" stroke-width="4" />
      <line x1="100" y1="10" x2="100" y2="30" stroke-width="4" />
      <circle class="part part-head" cx="100" cy="45" r="15" stroke-width="3" />
      <path class="part part-hair" d="M 87 34 Q 100 22 113 34" stroke-width="3" />
      <circle class="part part-eyes" cx="94" cy="43" r="1.5" stroke-width="2" fill="var(--accent-gold)" />
      <circle class="part part-eyes" cx="106" cy="43" r="1.5" stroke-width="2" fill="var(--accent-gold)" />
      <line class="part part-nose" x1="100" y1="45" x2="100" y2="50" stroke-width="2" />
      <path class="part part-mouth" d="M 93 53 Q 100 58 107 53" stroke-width="2" />
      <line class="part part-body" x1="100" y1="60" x2="100" y2="105" stroke-width="3" />
      <line class="part part-armL" x1="100" y1="70" x2="80" y2="95" stroke-width="3" />
      <line class="part part-armR" x1="100" y1="70" x2="120" y2="95" stroke-width="3" />
      <line class="part part-legL" x1="100" y1="105" x2="82" y2="140" stroke-width="3" />
      <line class="part part-legR" x1="100" y1="105" x2="118" y2="140" stroke-width="3" />
    </svg>

    <p id="wordDisplay" class="word-display"></p>
    <p id="triesLeft">Essais restants : 6</p>

    <div class="keyboard" id="keyboard"></div>

    <div class="actions">
      <a href="../index.html" class="btn-small">Accueil</a>
    </div>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2 id="resultTitle"></h2>
      <p id="resultWord" class="reveal-word"></p>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pendu.js"></script>
</body>
</html>
