<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Pendu</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/pendu.css">
</head>

<body>

  <h1>🪢 Pendu</h1>
  <p id="theme">Thème : ...</p>

  <svg class="hangman-figure" id="figure" viewBox="0 0 160 180">
    <line x1="10" y1="170" x2="110" y2="170" stroke-width="4" />
    <line x1="30" y1="170" x2="30" y2="10" stroke-width="4" />
    <line x1="30" y1="10" x2="100" y2="10" stroke-width="4" />
    <line x1="100" y1="10" x2="100" y2="30" stroke-width="4" />
    <circle class="part part-0" cx="100" cy="45" r="15" stroke-width="3" />
    <line class="part part-1" x1="100" y1="60" x2="100" y2="105" stroke-width="3" />
    <line class="part part-2" x1="100" y1="70" x2="80" y2="95" stroke-width="3" />
    <line class="part part-3" x1="100" y1="70" x2="120" y2="95" stroke-width="3" />
    <line class="part part-4" x1="100" y1="105" x2="82" y2="140" stroke-width="3" />
    <line class="part part-5" x1="100" y1="105" x2="118" y2="140" stroke-width="3" />
  </svg>

  <p id="wordDisplay" class="word-display"></p>
  <p id="triesLeft">Essais restants : 6</p>

  <div class="keyboard" id="keyboard"></div>

  <div class="actions">
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2 id="resultTitle"></h2>
      <p id="resultWord" class="reveal-word"></p>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pendu.js"></script>
</body>
</html>
