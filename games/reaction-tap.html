<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Reaction Tap</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/reaction-tap.css">
</head>

<body>

  <h1>⚡ Reaction Tap</h1>
  <p id="roundInfo">Manche 0/5</p>

  <div class="tap-box idle" id="box">
    <span id="status">Clique pour commencer</span>
  </div>

  <div class="actions">
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2>⚡ Résultats</h2>
      <div class="win-stats">
        <p>Temps moyen : <span id="statAvg"></span> ms</p>
        <p>Meilleur temps : <span id="statBest"></span> ms</p>
        <p>Record personnel : <span id="statRecord"></span> ms</p>
      </div>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/reaction-tap.js"></script>
</body>
</html>
