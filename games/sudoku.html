<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Sudoku</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/sudoku.css">
</head>

<body>

  <h1>🔢 Sudoku</h1>
  <p id="status">Remplis la grille avec les chiffres de 1 à 9</p>

  <div class="sudoku-grid" id="grid"></div>

  <div class="actions">
    <button class="btn-small" id="validate">Valider</button>
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2>🎉 Bravo, grille résolue !</h2>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/sudoku.js"></script>
</body>
</html>
