<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Mastermind</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/mastermind.css">
</head>

<body>

  <h1>🎯 Mastermind</h1>
  <p id="triesLeft">Essais restants : 10</p>

  <div class="palette" id="palette"></div>

  <div class="current-guess" id="currentGuess"></div>

  <div class="guess-actions">
    <button class="btn-small" id="clearBtn">Effacer</button>
    <button class="btn-small" id="submitBtn">Valider</button>
  </div>

  <p class="legend">
    <span class="legend-dot green"></span> bonne couleur, bonne place
    &nbsp;·&nbsp;
    <span class="legend-dot gold"></span> bonne couleur, mauvaise place
    &nbsp;·&nbsp;
    <span class="legend-dot red"></span> couleur absente
    <br>
    <small>(les points ne sont pas dans l'ordre de tes pastilles, ce sont juste des totaux)</small>
  </p>

  <div class="history" id="history"></div>

  <div class="actions">
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2 id="resultTitle"></h2>
      <div class="reveal-combo" id="revealCombo" hidden></div>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/mastermind.js"></script>
</body>
</html>
