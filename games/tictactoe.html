<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Tic Tac Toe</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/tictactoe.css">
</head>

<body>

  <h1>❌⭕ Tic Tac Toe</h1>

  <div class="difficulty-select" id="difficultySelect">
    <p>Choisis la difficulté</p>
    <div class="difficulty-buttons">
      <button class="btn-small" data-difficulty="facile">Facile</button>
      <button class="btn-small" data-difficulty="moyen">Moyen</button>
      <button class="btn-small" data-difficulty="difficile">Difficile</button>
    </div>
    <div class="actions">
      <a href="../index.html" class="btn-small">Menu principal</a>
    </div>
  </div>

  <div id="gameArea" hidden>
    <p id="status">À toi de jouer (X)</p>

    <div class="ttt-grid" id="grid"></div>

    <div class="actions">
      <a href="../index.html" class="btn-small">Accueil</a>
    </div>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2 id="resultTitle"></h2>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/tictactoe.js"></script>
</body>
</html>
