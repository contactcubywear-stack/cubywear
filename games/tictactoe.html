<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    body { background:#111; color:white; text-align:center; }
    .grid { display:grid; grid-template-columns:repeat(3,100px); gap:5px; margin:50px auto; }
    .cell { width:100px; height:100px; background:#222; font-size:50px; display:flex; justify-content:center; align-items:center; cursor:pointer; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div class="grid" id="grid"></div>

<script type="module" src="../js/games/tictactoe.js"></script>
</body>
</html>
