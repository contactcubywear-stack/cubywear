<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Memory</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/memory.css?v=3">
</head>

<body>

  <h1>🧠 Memory</h1>
  <p id="timer">00:00</p>
  <p id="info">0 coups</p>
  <p id="triesLeft"></p>

  <div class="memory-container" id="gameBoard"></div>

  <div class="actions">
    <a href="memory-select.html" class="btn-small">Changer niveau</a>
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="winModal" hidden>
    <div class="win-modal-content">
      <h2>🎉 Bravo, tu as gagné !</h2>
      <div class="win-stats">
        <p>Niveau : <span id="statLevel"></span></p>
        <p>Coups joués : <span id="statMoves"></span></p>
        <p>Temps restant : <span id="statTime"></span></p>
      </div>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <div class="win-modal" id="loseModal" hidden>
    <div class="win-modal-content">
      <h2 id="loseTitle">😕 Perdu !</h2>
      <div class="win-stats">
        <p>Niveau : <span id="loseStatLevel"></span></p>
        <p>Coups joués : <span id="loseStatMoves"></span></p>
      </div>
      <div class="win-actions">
        <button class="btn-small" id="loseReplayBtn">Rejouer</button>
        <a href="memory-select.html" class="btn-small">Changer niveau</a>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script src="../js/memory.js"></script>
</body>
</html>
