<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – 2048 Lite</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/2048.css">
</head>

<body>

  <h1>🔢 2048 Lite</h1>
  <p id="score">Score : 0</p>

  <div class="board-2048" id="board"></div>

  <p class="hint">Utilise les boutons ci-dessous pour bouger les tuiles</p>

  <div class="dpad">
    <button class="btn-small dpad-up" id="btnUp" aria-label="Haut">▲</button>
    <div class="dpad-row">
      <button class="btn-small dpad-left" id="btnLeft" aria-label="Gauche">◀</button>
      <button class="btn-small dpad-down" id="btnDown" aria-label="Bas">▼</button>
      <button class="btn-small dpad-right" id="btnRight" aria-label="Droite">▶</button>
    </div>
  </div>

  <div class="actions">
    <a href="../games/2048.html" class="btn-small" id="restartBtn">Rejouer</a>
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <script type="module" src="../js/2048.js"></script>
</body>
</html>
