<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cubiwear – Swipe Runner</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/swipe-runner.css">
</head>

<body>

  <h1>🏃 Swipe Runner</h1>
  <p id="score">Score : 0</p>

  <div class="runner-area" id="area">
    <div class="lane" data-lane="0"></div>
    <div class="lane" data-lane="1"></div>
    <div class="lane" data-lane="2"></div>
    <div class="runner" id="runner">🏃</div>
    <div class="runner-start" id="startOverlay">
      <button class="btn-small" id="startBtn">Commencer</button>
    </div>
  </div>

  <p class="hint">Glisse (ou utilise les boutons) gauche/droite pour changer de voie</p>

  <div class="lane-buttons">
    <button class="btn-small" id="btnLeft" aria-label="Gauche">◀</button>
    <button class="btn-small" id="btnRight" aria-label="Droite">▶</button>
  </div>

  <div class="actions">
    <a href="../index.html" class="btn-small">Accueil</a>
  </div>

  <div class="win-modal" id="resultModal" hidden>
    <div class="win-modal-content">
      <h2>💥 Touché !</h2>
      <div class="win-stats">
        <p>Score final : <span id="statScore"></span></p>
      </div>
      <div class="win-actions">
        <button class="btn-small" id="replayBtn">Rejouer</button>
        <a href="../index.html" class="btn-small">Menu principal</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/swipe-runner.js"></script>
</body>
</html>
